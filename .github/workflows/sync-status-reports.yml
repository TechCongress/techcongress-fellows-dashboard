name: Sync Monthly Status Reports

# Runs at 9 AM EST on the 1st of every month (14:00 UTC covers EST and EDT)
on:
  schedule:
    - cron: '0 14 1 * *'
  workflow_dispatch:  # Adds a "Run workflow" button in GitHub for manual runs

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install gspread google-auth pytz

      - name: Write secrets file
        run: |
          mkdir -p .streamlit
          echo "${{ secrets.SECRETS_TOML }}" > .streamlit/secrets.toml

      - name: Run sync
        run: python sync_status_reports.py
